{% extends 'pos/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="admin-app" style="display:block;">
    <div class="header">
        <h1>⚙️ Admin</h1>
        <div class="user-info">
            <span>Admin</span>
            <span class="role-badge">Admin</span>
            <a href="{% url 'logout' %}" class="logout-btn">Chiqish</a>
        </div>
    </div>

    <div class="admin-tabs">
        <a href="{% url 'admin_orders' %}">📋 Zakazlar</a>
        <a href="{% url 'admin_menu' %}">🍽️ Menyu</a>
        <a href="{% url 'admin_tables' %}">🪑 Stollar</a>
        <a href="{% url 'admin_users' %}" class="active">👤 Xodimlar</a>
        <a href="{% url 'admin_reports' %}">📊 Hisobot</a>
    </div>

    <div class="admin-content">
        <div class="admin-card">
            <h4>{{ title }}</h4>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Login</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label>Ism</label>
                    {{ form.first_name }}
                </div>
                <div class="form-group">
                    <label>Parol {% if editing %}(o'zgartirmaslik uchun bo'sh qoldiring){% endif %}</label>
                    {{ form.password }}
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select name="role" class="form-control">
                        <option value="waiter" {% if user_obj and user_obj.userprofile.role == 'waiter' %}selected{% endif %}>Ofitsiant</option>
                        <option value="admin" {% if user_obj and user_obj.userprofile.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <button type="submit" class="admin-btn">{% if editing %}Saqlash{% else %}Qo'shish{% endif %}</button>
                <a href="{% url 'admin_users' %}" class="admin-btn secondary" style="display:block;text-align:center;text-decoration:none;">Bekor qilish</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
