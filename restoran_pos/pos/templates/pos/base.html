{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Restoran Boshqaruvi{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'pos/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="toast-message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script>
        // Auto-hide messages
        setTimeout(() => {
            document.querySelectorAll('.toast-message').forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            });
        }, 3000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
