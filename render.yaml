services:
  - type: web
    name: restoran-pos
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt --verbose
      python restoran_pos/manage.py collectstatic --noinput
    startCommand: |
      cd restoran_pos
      python manage.py check
      python manage.py migrate --noinput
      python manage.py seed_default_data --reset-passwords
      python check_startup.py
      gunicorn --workers 2 --bind 0.0.0.0:$PORT --timeout 60 --access-logfile - wsgi_startup:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: "False"
